version: 2
updates:
  # JavaScript / TypeScript dependencies (npm)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Group all non-major updates into a single PR
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      # Security fixes grouped on their own
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"

  # Base image used by the Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
    groups:
      docker:
        applies-to: version-updates
        patterns:
          - "*"
